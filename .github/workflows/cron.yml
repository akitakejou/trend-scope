name: Daily Trend Article Generation

on:
  schedule:
    # 日本時間の 朝9:00、15:00、夜21:00、深夜3:00 に実行
    - cron: '0 0,6,12,18 * * *'
  # GitHubの画面から手動でいつでも実行できるようにするボタンを追加
  workflow_dispatch:

jobs:
  cron:
    runs-on: ubuntu-latest
    steps:
      - name: Call Trend Trigger API
        run: |
          curl -X GET "https://あなたのVercelのドメイン.vercel.app/api/cron" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"